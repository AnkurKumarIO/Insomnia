services:
  - type: web
    name: alumnex-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5001
      - key: FRONTEND_URL
        value: https://insomnia-roan.vercel.app
      - key: NODE_ENV
        value: production
